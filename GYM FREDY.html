document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

        <\u002Fdiv>\n        <div style=\"text-align: center; font-size: 11px; color: var(--faint); margin-top: 9px; line-height: 1.4;\">Pone en cero series, tiempo, récords, retos y peso. Tu plan se conserva.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- BOTTOM NAV -->\n  <div style=\"position: absolute; bottom: 0; left: 0; right: 0; height: 88px; background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter: blur(20px); border-top: 1px solid var(--line); display: flex; align-items: flex-start; padding: 11px 10px 0; z-index: 50;\">\n    <div onclick=\"{{ goHome }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: {{ navHome }};\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 11l8-7 8 7M6 10v9h12v-9\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font-size: 10px; font-weight: 600;\">Inicio<\u002Fspan><\u002Fdiv>\n    <div onclick=\"{{ goPlan }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: {{ navPlan }};\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 4v16M18 4v16M3 8h3M3 16h3M18 8h3M18 16h3M6 12h12\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font-size: 10px; font-weight: 600;\">Plan<\u002Fspan><\u002Fdiv>\n    <div onclick=\"{{ goLibrary }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer;\"><div style=\"width: 48px; height: 48px; border-radius: 15px; background: var(--accent); color: var(--ink); display: flex; align-items: center; justify-content: center; margin-top: -4px; box-shadow: 0 8px 20px -7px var(--accent);\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 5a1 1 0 011-1h5v16H5a1 1 0 01-1-1V5zM14 4h5a1 1 0 011 1v14a1 1 0 01-1 1h-5V4z\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n    <div onclick=\"{{ goStats }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: {{ navStats }};\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 19V9M12 19V5M19 19v-7\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font-size: 10px; font-weight: 600;\">Stats<\u002Fspan><\u002Fdiv>\n    <div onclick=\"{{ goProfile }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: {{ navProfile }};\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"8\" r=\"4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><path d=\"M4 20c0-4 3.5-6 8-6s8 2 8 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font-size: 10px; font-weight: 600;\">Perfil<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 440, &quot;height&quot;: 956}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home', theme: 'azul',\n    activeWeek: 1, activeDay: 1, activeEx: null,\n    sets: {}, completed: {}, fav: {},\n    weightLog: [],\n    bests: {}, prCount: 0, totalSec: 0,\n    profile: { heightCm: 165, age: 31, sex: 'M', goalWeight: 0, restSec: 120 },\n    reminders: true,\n    days: null, planName: 'Mi plan',\n    editMode: false,\n    libGroup: 'all', libSearch: '', libPickDay: null,\n    swRunning: false, swSec: 0,\n    restActive: false, restRemain: 0, restTotal: 0,\n    statBar: null,\n    xpToast: null, statsTab: 'progreso',\n    lastSession: null, sessionXP: 0, sessionSets: 0,\n  };\n\n  THEMES = {\n    azul:     { accent: '#3B7BFF', accentD: '#2A5FD8', ok: '#2BD66A', warn: '#FFB02E', bg: '#0A0C10', card: '#15181F', card2: '#1E222B', line: '#272C36', text: '#EAEEF4', dim: '#8A93A2', faint: '#5A626F', ink: '#06080C', name: 'Azul' },\n    esmeralda:{ accent: '#13C99A', accentD: '#0EA37C', ok: '#3BD67A', warn: '#FFC247', bg: '#080C0B', card: '#121815', card2: '#1A221E', line: '#243029', text: '#E9F2EE', dim: '#86958E', faint: '#566159', ink: '#04100B', name: 'Esmeralda' },\n    magma:    { accent: '#FF6A3D', accentD: '#E04F22', ok: '#2BD66A', warn: '#FFC247', bg: '#0E0A09', card: '#1A1311', card2: '#241A16', line: '#322420', text: '#F4ECE8', dim: '#A18F87', faint: '#6B5A52', ink: '#140A06', name: 'Magma' },\n  };\n\n  WEEKS = {\n    1: { focus: 'Adaptación', rpe: 5, rest: '90 s', note: 'Aprende técnica con cargas suaves. Prioridad: forma.', mult: 1.0 },\n    2: { focus: 'Construcción', rpe: 6, rest: '75 s', note: '+1 serie en básicos. Sube un punto de esfuerzo.', mult: 1.06 },\n    3: { focus: 'Carga', rpe: 7, rest: '60 s', note: 'Sube cargas 5–10% si tu forma es perfecta.', mult: 1.14 },\n    4: { focus: 'Descarga', rpe: 5, rest: '90 s', note: 'Bajamos volumen. Mides tu peso. Recuperación.', mult: 0.85 },\n  };\n\n  GROUPS = [\n    { key: 'piernas', name: 'Piernas' }, { key: 'pecho', name: 'Pecho' }, { key: 'espalda', name: 'Espalda' },\n    { key: 'hombros', name: 'Hombros' }, { key: 'biceps', name: 'Bíceps' }, { key: 'triceps', name: 'Tríceps' },\n    { key: 'core', name: 'Core' }, { key: 'cardio', name: 'Cardio' },\n  ];\n\n  CAT() { return (typeof window !== 'undefined' && window.GYM_CATALOG) || []; }\n  catById(id) { return this.CAT().find(c => c.id === id); }\n\n  defaultDays() {\n    return [\n      { short: 'Tren Inferior', dur: '60 min', coach: 'Piernas de bajo impacto. La mancuerna al frente protege tu lumbar — baja solo donde mantengas la espalda recta.',\n        items: [ {cid:'c60',sets:1,reps:5,lb:0}, {cid:'c1',sets:3,reps:10,lb:20}, {cid:'c8',sets:3,reps:12,lb:20}, {cid:'c11',sets:3,reps:12,lb:15}, {cid:'c52',sets:3,reps:20,lb:0}, {cid:'c61',sets:1,reps:20,lb:0} ] },\n      { short: 'Empuje', dur: '60 min', coach: 'Pecho, tríceps y hombro anterior. Codos a 45° del cuerpo, nunca a 90°. Así proteges tus hombros.',\n        items: [ {cid:'c60',sets:1,reps:5,lb:0}, {cid:'c14',sets:3,reps:10,lb:40}, {cid:'c15',sets:3,reps:10,lb:30}, {cid:'c20',sets:3,reps:12,lb:20}, {cid:'c46',sets:3,reps:12,lb:25}, {cid:'c61',sets:1,reps:15,lb:0} ] },\n      { short: 'Tracción', dur: '55 min', coach: 'Espalda y bíceps. Tira siempre hacia el pecho, nunca tras la nuca. Tira con la espalda, no con el lumbar.',\n        items: [ {cid:'c60',sets:1,reps:5,lb:0}, {cid:'c23',sets:3,reps:10,lb:70}, {cid:'c26',sets:3,reps:10,lb:60}, {cid:'c28',sets:3,reps:10,lb:20}, {cid:'c40',sets:3,reps:10,lb:30}, {cid:'c61',sets:1,reps:15,lb:0} ] },\n      { short: 'Full Body', dur: '60 min', coach: 'Circuito ligero + el cardio más largo. Prioriza forma sobre carga. El Z2 largo es el que más quema.',\n        items: [ {cid:'c60',sets:1,reps:5,lb:0}, {cid:'c1',sets:2,reps:12,lb:15}, {cid:'c14',sets:2,reps:12,lb:30}, {cid:'c23',sets:2,reps:12,lb:55}, {cid:'c54',sets:2,reps:10,lb:0}, {cid:'c62',sets:1,reps:25,lb:0} ] },\n    ];\n  }\n  days() { return this.state.days || this.defaultDays(); }\n\n  componentDidMount() {\n    try { const raw = localStorage.getItem('gymfredy_v3'); if (raw) this.setState(JSON.parse(raw)); } catch (e) {}\n    if (!this.state.days) this.setState({ days: this.defaultDays() });\n    this._ensureCatalog();\n    this._playVideos();\n    this._onScroll = () => { if (this._st) return; this._st = requestAnimationFrame(() => { this._st = null; this._manageThumbs(); }); };\n    setTimeout(() => { const sc = document.getElementById('gf-scroll'); if (sc) sc.addEventListener('scroll', this._onScroll, { passive: true }); this._manageThumbs(); }, 200);\n    this._tick = setInterval(() => {\n      if (this.state.swRunning) {\n        this.setState(s => ({ swSec: s.swSec + 1, totalSec: s.totalSec + 1 }));\n        if ((this.state.totalSec % 12) === 0) this.persist({});\n      }\n      if (this.state.restActive && this.state.restRemain > 0) {\n        this.setState(s => ({ restRemain: Math.max(0, s.restRemain - 1), restActive: (s.restRemain - 1) > 0 }));\n      }\n    }, 1000);\n  }\n  _ensureCatalog() {\n    if (this.CAT().length) { this.forceUpdate(); return; }\n    let tries = 0;\n    const iv = setInterval(() => { tries++; if (this.CAT().length || tries > 40) { clearInterval(iv); this.forceUpdate(); } }, 120);\n  }\n  componentWillUnmount() { clearInterval(this._tick); const sc = document.getElementById('gf-scroll'); if (sc && this._onScroll) sc.removeEventListener('scroll', this._onScroll); }\n  componentDidUpdate() { this._playVideos(); }\n  _playVideos() { setTimeout(() => { document.querySelectorAll('.gf-root video:not([data-src])').forEach(v => { v.muted = true; const p = v.play(); if (p && p.catch) p.catch(() => {}); }); this._manageThumbs(); }, 60); }\n\n  persist(extra) {\n    const s = { ...this.state, ...extra };\n    try { localStorage.setItem('gymfredy_v3', JSON.stringify({ theme: s.theme, activeWeek: s.activeWeek, activeDay: s.activeDay, completed: s.completed, fav: s.fav, weightLog: s.weightLog, reminders: s.reminders, sets: s.sets, days: s.days, planName: s.planName, bests: s.bests, prCount: s.prCount, totalSec: s.totalSec, profile: s.profile, lastSession: s.lastSession })); } catch (e) {}\n  }\n\n  go(s) { return () => { this.setState({ screen: s }); this._scrollTop(); }; }\n  _scrollTop() { const el = document.getElementById('gf-scroll'); if (el) el.scrollTop = 0; }\n\n  // ----- media element builders -----\n  _manageThumbs() {\n    const vh = window.innerHeight || 956;\n    const all = [...document.querySelectorAll('.gf-root video[data-src]')];\n    let loading = all.filter(v => v.getAttribute('src') && v.readyState < 3 && !v.error).length;\n    const MAX = 6;\n    all.forEach(v => {\n      const r = v.getBoundingClientRect();\n      const visible = r.bottom > -200 && r.top < vh + 200 && r.width > 0;\n      if (visible) {\n        if (!v.getAttribute('src')) { if (loading < MAX) { v.setAttribute('src', v.dataset.src); loading++; } }\n        v.muted = true; const p = v.play(); if (p && p.catch) p.catch(() => {});\n      } else { try { v.pause(); } catch (_) {} }\n    });\n  }\n  _retry(e) {\n    const v = e.target;\n    v._tries = (v._tries || 0) + 1;\n    if (v._tries > 2) return; // no insistir: el placeholder de fondo queda visible\n    const url = v.getAttribute('src') || v.dataset.src;\n    if (!url) return;\n    setTimeout(() => { try { v.setAttribute('src', url); v.load(); const p = v.play(); if (p && p.catch) p.catch(() => {}); } catch (_) {} }, 2500 * v._tries);\n  }\n  res(u) { return (typeof window !== 'undefined' && window.__resources && window.__resources[u]) || u; }\n  _mediaTile(item, big) {\n    const wrap = { position: 'relative', width: '100%', height: '100%', overflow: 'hidden', background: 'linear-gradient(135deg, #1b2028, #12161c)', display: 'block' };\n    const vid = { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', display: 'block' };\n    const ph = { position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '6px', color: '#5A626F', pointerEvents: 'none' };\n    const children = [\n      React.createElement('div', { key: 'ph', style: ph },\n        React.createElement('div', { style: { fontSize: big ? '34px' : '20px', lineHeight: 1 } }, '🏋️'),\n        big ? React.createElement('div', { style: { fontSize: '11px', fontWeight: 600 } }, 'Cargando video…') : null\n      ),\n    ];\n    if (item && item.video) {\n      if (big) children.push(React.createElement('video', { key: 'v', src: this.res(item.video), autoPlay: true, loop: true, muted: true, playsInline: true, preload: 'auto', onError: (e) => this._retry(e), style: vid }));\n      else children.push(React.createElement('video', { key: 'v', 'data-src': this.res(item.video), loop: true, muted: true, playsInline: true, preload: 'none', onError: (e) => this._retry(e), style: vid }));\n    }\n    return React.createElement('div', { style: wrap }, children);\n  }\n  mediaEl(item) { if (!item) return null; return this._mediaTile(item, true); }\n  thumbEl(item) { if (!item) return null; return this._mediaTile(item, false); }\n\n  // ----- muscle parsing -----\n  mColor(pct, T) { return pct >= 55 ? T.accent : (pct >= 30 ? 'color-mix(in srgb, ' + T.accent + ' 60%, ' + T.dim + ')' : T.dim); }\n\n  // ----- RPG helpers (level cap 100) -----\n  xpToReach(L) { if (L <= 1) return 0; return Math.round(55 * Math.pow(L - 1, 1.8)); }\n  levelFromXp(xp) { let L = 1; while (L < 100 && this.xpToReach(L + 1) <= xp) L++; return L; }\n  rankTitle(L) {\n    const ranks = [[1,'Novato de Hierro'],[6,'Aprendiz'],[12,'Guerrero'],[20,'Veterano'],[30,'Gladiador'],[45,'Campeón'],[60,'Titán'],[80,'Leyenda'],[100,'Inmortal del Hierro']];\n    let t = ranks[0][1]; for (const [lv, nm] of ranks) if (L >= lv) t = nm; return t;\n  }\n  fmtClock(n) { n = Math.max(0, Math.floor(n)); return String(Math.floor(n / 60)).padStart(2, '0') + ':' + String(n % 60).padStart(2, '0'); }\n  dynamicGreeting() {\n    const h = new Date().getHours();\n    const base = h < 6 ? 'Madrugando 💪' : h < 12 ? 'Buenos días,' : h < 19 ? 'Buenas tardes,' : 'Buenas noches,';\n    const nm = (this.state.profile && this.state.profile.name) ? (' ' + this.state.profile.name) : '';\n    return base + nm;\n  }\n\n  // ----- XP toast + session accumulation -----\n  _levelNow() { return this.levelFromXp(this._xpTotalNow()); }\n  _xpTotalNow() {\n    // mirror of statsData XP formula (read-only) so we can detect level-ups\n    const sets = this.state.sets, completed = this.state.completed;\n    const days = this.days(); const keyToCid = {};\n    for (let w = 1; w <= 4; w++) for (let d = 0; d < days.length; d++) days[d].items.forEach((it, i) => { keyToCid['w'+w+'d'+(d+1)+'i'+i] = it.cid; });\n    let volume = 0, setsDone = 0, cardioMin = 0;\n    for (const key in sets) { let cid = keyToCid[key]; if (!cid && key.indexOf('lib_') === 0) cid = key.slice(4); const c = cid ? this.catById(cid) : null; for (const s of sets[key]) { if (!s.done) continue; setsDone++; if (c && c.isCardio) cardioMin += (s.reps||0); else volume += (s.lb||0)*(s.reps||0); } }\n    const exDone = Object.values(completed).filter(Boolean).length;\n    const minutes = Math.floor(this.state.totalSec/60) + cardioMin;\n    const wl = this.state.weightLog; const weightLost = wl.length > 1 ? Math.max(0, wl[0]-wl[wl.length-1]) : 0;\n    // challenge XP\n    const chk = [[1,setsDone,20],[25,setsDone,60],[100,setsDone,150],[10,exDone,80],[50,exDone,200],[1000,volume,50],[10000,volume,150],[50000,volume,350],[60,minutes,60],[300,minutes,180],[1,this.state.prCount,40],[10,this.state.prCount,140],[5,weightLost,120],[15,weightLost,300]];\n    let chXP = 0; chk.forEach(([t,c,xp]) => { if (c >= t) chXP += xp; });\n    return setsDone*12 + exDone*40 + minutes*2 + this.state.prCount*30 + chXP + Math.round(weightLost*20);\n  }\n  _pushXP(amount) {\n    if (amount > 0) this.setState({ xpToast: { amount, id: Date.now() }, sessionXP: this.state.sessionXP + amount });\n    clearTimeout(this._xpTimer);\n    this._xpTimer = setTimeout(() => this.setState({ xpToast: null }), 1200);\n  }\n  _saveSession(leveledTo) {\n    if (this.state.sessionXP <= 0 && this.state.sessionSets <= 0) return;\n    const lastSession = { xp: this.state.sessionXP, sets: this.state.sessionSets, leveledTo: leveledTo || null };\n    this.setState({ lastSession }); this.persist({ lastSession });\n  }\n  // ----- set completion: PR + rest timer -----\n  onSetDone(cid, lb) {\n    const before = this._levelNow();\n    this.setState(s => {\n      const bests = { ...s.bests };\n      let pr = s.prCount;\n      if (lb > 0 && lb > (bests[cid] || 0)) { bests[cid] toLevel.toLocaleString('es-MX') + ' / ' + xpForLevel.toLocaleString('es-MX') + ' XP'),\n      statSetsDone: setsDone, statMinutes: minutes, statExDone: exDone,\n      // challenges\n      challenges, wonChallenges, hasWon: wonChallenges.length > 0,\n      wonCount: wonChallenges.length, totalChallenges: challenges.length,\n      nextChallengeKicker: setsDone === 0 ? '🎯 Tu primer objetivo' : 'Próximo reto',\n      nextChallengeName: nextC ? nextC.name : '¡Todos los retos completados!',\n      nextChallengeDesc: nextC ? nextC.desc : 'Eres imparable, Fredy',\n      nextChallengeIcon: nextC ? nextC.icon : '🏆',\n      nextChallengePct: nextC ? nextC.pctW : '100%',\n      nextChallengeProg: nextC ? nextC.curLabel : '',\n      nextChallengeXP: nextC ? nextC.xpLabel : '',\n      // total lifted\n      liftedTotalFull: Math.round(volume).toLocaleString('es-MX'),\n      compareIcon: reached ? obj.icon : objs[0].icon, compareCount, compareName: reached ? obj.n : objs[0].n,\n      compareText: reached ? ('El peso de ' + compareCount + ' ' + obj.n + ' movido por tus músculos.') : ('Aún no llegas a tu 1er ' + objs[0].n.replace(/s$/,'') + ' (' + objs[0].lb + ' lb). ¡Marca series!'),\n      comparePct: comparePct + '%', compareNext: nextObj.icon + ' 1 ' + nextObj.n.replace(/s$/,''),\n      // group chart\n      groupBars, groupHint,\n      // weight\n      weightPath: big.path, weightArea: big.area, weightGrad: 'color-mix(in srgb, '+accent+' 20%, transparent)',\n      weightDots: big.pts.map((p,i)=>({ x:p[0].toFixed(1), y:p[1].toFixed(1), r:i===big.pts.length-1?4:2.6 })),\n      hasWeightData: wl.length >= 2, weightEmpty: !hasWeight, hasWeightAny: hasWeight,\n      showGoalLine: (wl.length >= 2 && !!goal), goalLineY: goalLineY.toFixed(1),\n      weightStartLabel: hasWeight ? wFirst : '—', weightTargetLabel: goal ? goal : 'sin meta',\n      goalPct: goalPctN + '%', goalPctLabel: goalPctN + '%', weightToGo: (hasWeight && goal) ? Math.max(0, wCur - goal) : 0, hasGoal: !!goal,\n      bmi: hasWeight ? bmi.toFixed(1) : '—', bmiLabel, bmiColor,\n      kcalBurned: kcalBurned.toLocaleString('es-MX'), lossFromExercise: lossFromExercise.toFixed(2), bmr: bmr ? bmr.toLocaleString('es-MX') : '—',\n      // records\n      records, hasRecords: records.length > 0, noRecords: records.length === 0, prCount,\n      isNewUser: setsDone === 0, hasProgress: setsDone > 0,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
